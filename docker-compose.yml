services:
  db:
    image: mysql:8.0
    container_name: db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      USER_DB_PASSWORD: ${USER_DB_PASSWORD}
      PRODUCT_DB_PASSWORD: ${PRODUCT_DB_PASSWORD}
      ORDER_DB_PASSWORD: ${ORDER_DB_PASSWORD}
      INVENTORY_DB_PASSWORD: ${INVENTORY_DB_PASSWORD}
      EMPLOYEE_DB_PASSWORD: ${EMPLOYEE_DB_PASSWORD}
      ATTENDANCE_DB_PASSWORD: ${ATTENDANCE_DB_PASSWORD}
      EXPENSE_DB_PASSWORD: ${EXPENSE_DB_PASSWORD}
      CUSTOMER_DB_PASSWORD: ${CUSTOMER_DB_PASSWORD}
      PAYMENT_DB_PASSWORD: ${PAYMENT_DB_PASSWORD}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
      - ./infra/mysql/init-dbs.sh:/docker-entrypoint-initdb.d/init-dbs.sh:ro
      - ./databases:/docker-entrypoint-initdb.d/sql:ro
    networks:
      - fashion-net

  user-service:
    build:
      context: .
      dockerfile: infra/php-apache/Dockerfile
    container_name: user-service
    restart: unless-stopped
    ports:
      - "8081:80"
    volumes:
      - ./services/user-service:/var/www/html
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: user_db
      DB_USER: user_service
      DB_PASSWORD: ${USER_DB_PASSWORD}
    depends_on:
      - db
    networks:
      - fashion-net

  product-service:
    build:
      context: .
      dockerfile: infra/php-apache/Dockerfile
    container_name: product-service
    restart: unless-stopped
    ports:
      - "8082:80"
    volumes:
      - ./services/product-service:/var/www/html
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: product_db
      DB_USER: product_service
      DB_PASSWORD: ${PRODUCT_DB_PASSWORD}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
    depends_on:
      - db
    networks:
      - fashion-net

  order-service:
    build:
      context: .
      dockerfile: infra/php-apache/Dockerfile
    container_name: order-service
    restart: unless-stopped
    ports:
      - "8083:80"
    volumes:
      - ./services/order-service:/var/www/html
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: order_db
      DB_USER: order_service
      DB_PASSWORD: ${ORDER_DB_PASSWORD}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
    depends_on:
      - db
    networks:
      - fashion-net

  payment-service:
    build:
      context: .
      dockerfile: infra/php-apache/Dockerfile
    container_name: payment-service
    restart: unless-stopped
    ports:
      - "8089:80"
    volumes:
      - ./services/payment-service:/var/www/html
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: order_db
      DB_USER: order_service
      DB_PASSWORD: ${ORDER_DB_PASSWORD}
    depends_on:
      - db
    networks:
      - fashion-net

  inventory-service:
    build:
      context: .
      dockerfile: infra/php-apache/Dockerfile
    container_name: inventory-service
    restart: unless-stopped
    ports:
      - "8084:80"
    volumes:
      - ./services/inventory-service:/var/www/html
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: inventory_db
      DB_USER: inventory_service
      DB_PASSWORD: ${INVENTORY_DB_PASSWORD}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
    depends_on:
      - db
    networks:
      - fashion-net

  employee-service:
    build:
      context: .
      dockerfile: infra/php-apache/Dockerfile
    container_name: employee-service
    restart: unless-stopped
    ports:
      - "8085:80"
    volumes:
      - ./services/employee-service:/var/www/html
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: employee_db
      DB_USER: employee_service
      DB_PASSWORD: ${EMPLOYEE_DB_PASSWORD}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
    depends_on:
      - db
    networks:
      - fashion-net

  attendance-service:
    build:
      context: .
      dockerfile: infra/php-apache/Dockerfile
    container_name: attendance-service
    restart: unless-stopped
    ports:
      - "8086:80"
    volumes:
      - ./services/attendance-service:/var/www/html
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: attendance_db
      DB_USER: attendance_service
      DB_PASSWORD: ${ATTENDANCE_DB_PASSWORD}
      USER_EMPLOYEE_API: http://user-service/api/users/employees/get-all.php
    depends_on:
      - db
      - user-service
    networks:
      - fashion-net

  expense-service:
    build:
      context: .
      dockerfile: infra/php-apache/Dockerfile
    container_name: expense-service
    restart: unless-stopped
    ports:
      - "8087:80"
    volumes:
      - ./services/expense-service:/var/www/html
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: expense_db
      DB_USER: expense_service
      DB_PASSWORD: ${EXPENSE_DB_PASSWORD}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
    depends_on:
      - db
    networks:
      - fashion-net

  customer-service:
    build:
      context: .
      dockerfile: infra/php-apache/Dockerfile
    container_name: customer-service
    restart: unless-stopped
    ports:
      - "8088:80"
    volumes:
      - ./services/customer-service:/var/www/html
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: customer_db
      DB_USER: customer_service
      DB_PASSWORD: ${CUSTOMER_DB_PASSWORD}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      MAIL_FROM: ${MAIL_FROM}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    depends_on:
      - db
    networks:
      - fashion-net

  api-gateway:
    image: nginx:1.27-alpine
    container_name: api-gateway
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./infra/gateway/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./web:/usr/share/nginx/html:ro
    depends_on:
      - user-service
      - product-service
      - order-service
      - inventory-service
      - employee-service
      - attendance-service
      - expense-service
      - customer-service
      - payment-service
    networks:
      - fashion-net

networks:
  fashion-net:
    driver: bridge

volumes:
  mysql_data:
